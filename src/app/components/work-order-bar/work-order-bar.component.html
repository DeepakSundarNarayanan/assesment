<div class="work-order-bar" [ngClass]="statusClass" [ngStyle]="barStyle">

  <!-- Tooltip -->
  <div class="bar-tooltip">
    <div class="tooltip-name">{{ workOrder.data.name }}</div>
    <div class="tooltip-status">{{ statusLabel }}</div>
    <div class="tooltip-dates">{{ formattedDateRange }}</div>
  </div>

  <div class="bar-content">
    <span class="bar-name">{{ workOrder.data.name }}</span>
    <span class="bar-status-badge" [ngClass]="statusClass">{{ statusLabel }}</span>
  </div>

  <button class="menu-btn" (click)="toggleMenu($event)">
    <i class="bi bi-three-dots"></i>
  </button>

  <!-- Dropdown Menu -->
  <div class="bar-menu" *ngIf="showMenu()">
    <div class="bar-menu-item" (click)="onEdit($event)">Edit</div>
    <div class="bar-menu-item delete" (click)="onDelete($event)">Delete</div>
  </div>
</div>
