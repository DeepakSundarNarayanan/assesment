<div class="panel-overlay" [class.is-closing]="isClosing()" (click)="onCancel()"></div>

<div class="panel" [class.is-closing]="isClosing()">
  <!-- Header -->
  <div class="panel-header">
    <div class="header-left">
      <h2 class="panel-title">Work Order Details</h2>
      <p class="panel-subtitle">Specify the dates, name and status for this order</p>
    </div>
    <div class="header-actions">
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button type="button" class="btn-save" (click)="onSubmit()">
        {{ isEdit ? 'Save' : 'Create' }}
      </button>
    </div>
  </div>

  <!-- Form -->
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="panel-form">

    <!-- Work Order Name -->
    <div class="form-group">
      <label>Work Order Name</label>
      <input
        type="text"
        formControlName="name"
        placeholder="Acme Inc."
        class="form-input"
        [class.error]="form.get('name')?.invalid && form.get('name')?.touched"/>
      <span class="error-msg"
        *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
        Name is required
      </span>
    </div>

    <!-- Status (ng-select) -->
    <div class="form-group">
      <label>Status</label>
      <ng-select
        formControlName="status"
        [items]="statusOptions"
        bindLabel="label"
        bindValue="value"
        [clearable]="false"
        [searchable]="false"
        class="status-select">
      </ng-select>
    </div>

    <!-- End Date -->
    <div class="form-group">
      <label>End Date</label>
      <div class="date-input-group"
        [class.error]="form.get('endDate')?.invalid && form.get('endDate')?.touched">
        <input
          class="form-input date-input"
          [value]="formatNgbDate(form.get('endDate')?.value)"
          readonly
          placeholder="DD.MM.YYYY"/>
        <button class="calendar-toggle-btn" (click)="toggleEndPicker()" type="button">
          <i class="bi bi-calendar3"></i>
        </button>
      </div>
      <div class="inline-picker" *ngIf="showEndPicker()">
        <ngb-datepicker
          [ngModel]="form.get('endDate')?.value"
          [ngModelOptions]="{standalone: true}"
          (dateSelect)="onDateSelect('endDate', $event)"
          navigation="arrows">
        </ngb-datepicker>
      </div>
      <span class="error-msg"
        *ngIf="form.get('endDate')?.invalid && form.get('endDate')?.touched">
        End date is required
      </span>
    </div>

    <!-- Start Date -->
    <div class="form-group">
      <label>Start Date</label>
      <div class="date-input-group"
        [class.error]="form.get('startDate')?.invalid && form.get('startDate')?.touched">
        <input
          class="form-input date-input"
          [value]="formatNgbDate(form.get('startDate')?.value)"
          readonly
          placeholder="DD.MM.YYYY"/>
        <button class="calendar-toggle-btn" (click)="toggleStartPicker()" type="button">
          <i class="bi bi-calendar3"></i>
        </button>
      </div>
      <div class="inline-picker" *ngIf="showStartPicker()">
        <ngb-datepicker
          [ngModel]="form.get('startDate')?.value"
          [ngModelOptions]="{standalone: true}"
          (dateSelect)="onDateSelect('startDate', $event)"
          navigation="arrows">
        </ngb-datepicker>
      </div>
      <span class="error-msg"
        *ngIf="form.get('startDate')?.invalid && form.get('startDate')?.touched">
        Start date is required
      </span>
    </div>

    <!-- Date order error -->
    <div class="overlap-error" *ngIf="dateOrderError">
      <i class="bi bi-exclamation-triangle"></i>
      End date must be after start date.
    </div>

    <!-- Overlap Error -->
    <div class="overlap-error" *ngIf="overlapError">
      <i class="bi bi-exclamation-triangle"></i>
      This work order overlaps with an existing one on the same work center.
    </div>

  </form>
</div>
