<div class="page-wrapper">
  <!-- Navbar -->
  <div class="app-navbar">
    <img src="/Group 3.png" alt="Naologic" class="brand-logo" />
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h1 class="page-title">Work Orders</h1>

    <!-- Timescale -->
    <div class="timescale-row">
      <div class="timescale-pill">
        <span class="timescale-label">Timescale</span>
        <div class="timescale-dropdown">
          <button class="timescale-btn" (click)="toggleTimescaleDropdown()">
            {{ timescale() }}
            <i class="bi bi-chevron-down"></i>
          </button>
          <div class="timescale-menu" *ngIf="showTimescaleDropdown()">
            <div
              class="timescale-item"
              *ngFor="let t of timescaleOptions; trackBy: trackByTimescale"
              [class.active]="timescale() === t"
              (click)="selectTimescale(t)">
              {{ t }}
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Timeline Grid -->
    <div class="timeline-wrapper">
      <div class="timeline-scroll">

        <!-- Header Row — badge lives inside the header cell to avoid z-index overlap -->
        <div class="grid-header">
          <div class="col-workcenter header-cell">Work Center</div>
          <div
            class="col-month header-cell"
            *ngFor="let col of columns; trackBy: trackByColumn"
            [style.min-width]="colMinWidth"
            [class.current-month-col]="isCurrentColumn(col.date)">
            <span class="col-label">{{ col.label }}</span>
            <span class="current-badge" *ngIf="isCurrentColumn(col.date)">
              {{ currentColumnLabel }}
            </span>
          </div>
        </div>

        <!-- Data Rows -->
        <div class="data-rows">
          <!-- Single today indicator line spanning all rows -->
          <div class="today-line" [style.left]="todayLineLeftAbsolute"></div>

          <div class="grid-row" *ngFor="let wc of workCenters; trackBy: trackByWorkCenter">

            <!-- Work Center Name -->
            <div class="col-workcenter row-cell">{{ wc.data.name }}</div>

            <!-- Month Cells + Bars -->
            <div class="col-months-wrapper" [style.min-width]="totalColumnsMinWidth">

              <!-- Background grid cells -->
              <div class="bg-cells">
                <div
                  class="bg-cell"
                  *ngFor="let col of columns; trackBy: trackByColumn"
                  [style.min-width]="colMinWidth"
                  [class.current-month-col]="isCurrentColumn(col.date)"
                  (click)="onCellClick(wc.docId, col.date)">
                </div>
              </div>

              <!-- Work Order Bars -->
              <div class="bars-layer">
                <app-work-order-bar
                  *ngFor="let wo of getWorkOrdersForCenter(wc.docId); trackBy: trackByWorkOrder"
                  [workOrder]="wo"
                  [columns]="columns"
                  [timescale]="timescale()"
                  (edit)="onEditWorkOrder($event)"
                  (delete)="onDeleteWorkOrder($event)">
                </app-work-order-bar>
              </div>

            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- Side Panel -->
  <app-work-order-panel
    *ngIf="isPanelOpen()"
    [workOrder]="selectedWorkOrder()"
    [workCenterId]="selectedWorkCenterId()"
    [prefillStartDate]="prefillStartDate()"
    [prefillEndDate]="prefillEndDate()"
    (close)="onPanelClose()"
    (save)="onPanelSave()">
  </app-work-order-panel>

</div>
